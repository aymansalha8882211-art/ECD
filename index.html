<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>بياناتي</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Tahoma, Arial, sans-serif;
  background: #0f3460;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

/* ===== LOGIN ===== */
#loginBox {
  background: white;
  border-radius: 16px;
  padding: 36px 30px;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
#loginBox h2 {
  font-size: 22px;
  color: #0f3460;
  text-align: center;
  margin-bottom: 6px;
}
.sub {
  font-size: 13px;
  color: #999;
  text-align: center;
  margin-bottom: 28px;
}
label {
  display: block;
  font-size: 13px;
  font-weight: bold;
  color: #444;
  margin-bottom: 6px;
}
input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid #ddd;
  border-radius: 8px;
  font-size: 15px;
  margin-bottom: 16px;
  font-family: inherit;
  text-align: right;
  transition: border-color .2s;
}
input:focus { outline: none; border-color: #0f3460; }
.btn-login {
  width: 100%;
  padding: 13px;
  background: #0f3460;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
}
.btn-login:hover { background: #16213e; }
.err {
  color: #cc0000;
  font-size: 13px;
  margin-top: 12px;
  text-align: center;
  display: none;
  background: #fff0f0;
  padding: 8px;
  border-radius: 6px;
}
.load {
  color: #888;
  font-size: 13px;
  margin-top: 10px;
  text-align: center;
  display: none;
}

/* ===== DATA PAGE ===== */
#dataBox {
  display: none;
  background: white;
  border-radius: 16px;
  padding: 24px;
  width: 100%;
  max-width: 1000px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.hdr {
  background: #0f3460;
  color: white;
  padding: 16px 20px;
  border-radius: 10px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}
.hdr h3 { font-size: 17px; }
.hdr .info { font-size: 12px; opacity: .8; margin-top: 3px; }
.badge {
  background: rgba(255,255,255,.2);
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  white-space: nowrap;
}
.wrap {
  overflow-x: auto;
  border-radius: 10px;
  border: 1px solid #eee;
  max-height: 60vh;
  overflow-y: auto;
}
table { width: 100%; border-collapse: collapse; min-width: 600px; }
th {
  background: #0f3460;
  color: white;
  padding: 10px 14px;
  text-align: right;
  font-size: 12px;
  white-space: nowrap;
  position: sticky;
  top: 0;
  z-index: 1;
}
td {
  padding: 9px 14px;
  border-bottom: 1px solid #f0f0f0;
  font-size: 13px;
  color: #333;
  white-space: nowrap;
}
tr:last-child td { border-bottom: none; }
tr:nth-child(even) td { background: #f8faff; }
.btn-out {
  margin-top: 14px;
  width: 100%;
  padding: 12px;
  background: #e74c3c;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  font-family: inherit;
}
.btn-out:hover { background: #c0392b; }
.empty {
  text-align: center;
  padding: 40px;
  color: #999;
  font-size: 14px;
}
</style>
</head>
<body>

<!-- صفحة الدخول -->
<div id="loginBox">
  <h2>📋 بياناتي</h2>
  <div class="sub">أدخل الكود وكلمة المرور الخاصة بك</div>
  <label>رقم الكود</label>
  <input type="number" id="num" placeholder="مثال: 5" autocomplete="off" />
  <label>كلمة المرور</label>
  <input type="password" id="pass" placeholder="••••••" />
  <button class="btn-login" onclick="doLogin()">دخول ◄</button>
  <div class="err" id="err"></div>
  <div class="load" id="load">⏳ جارٍ التحقق...</div>
</div>

<!-- صفحة البيانات -->
<div id="dataBox">
  <div class="hdr">
    <div>
      <h3 id="userName"></h3>
      <div class="info" id="userInfo"></div>
    </div>
    <span class="badge" id="countBadge"></span>
  </div>
  <div class="wrap">
    <table>
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <button class="btn-out" onclick="logout()">تسجيل الخروج</button>
</div>

<script>
// ============================================================
// ضع هنا الـ ID الخاص بملف Google Sheets
// مثال: https://docs.google.com/spreadsheets/d/SPREADSHEET_ID/edit
// ============================================================
var SHEET_ID = "1A6atJX5LpaqANoLv-mTssBmB8FIFhD_eRizUEH-UCWk";

// ============================================================
// بيانات المستخدمين - نفس الكود والباسورد
// ============================================================
var USERS = [
  { num: 1,  name: "رنا الوشاحي",         password: "pass@01" },
  { num: 2,  name: "مسعود عبد الدايم",     password: "pa@ss02" },
  { num: 3,  name: "عبد الله رأفت ظاهر",   password: "pass0@3" },
  { num: 5,  name: "كرم أبو رياش",         password: "p@ass05" },
  { num: 6,  name: "نسرين عماد البابا",    password: "pass0@6" },
  { num: 7,  name: "سلمى أبو جراد",        password: "pa@ss07" },
  { num: 8,  name: "هبة أبو سمعان",        password: "pass0@8" },
  { num: 9,  name: "محمد حليوة",           password: "@pass09" },
  { num: 10, name: "إيمان ابو اللبن",      password: "pass10@" },
  { num: 11, name: "اسيا فياض",            password: "pa@ss11" },
  { num: 12, name: "الهام أبو الكاس",      password: "pass@12" },
  { num: 13, name: "يوسف أبو زعيتر",       password: "p@ass13" },
  { num: 14, name: "صبحي الحاج احمد",      password: "pas@s14" },
  { num: 15, name: "مها العيلة",           password: "pass@15" },
  { num: 16, name: "احمد الزطمة",          password: "p@ass16" },
  { num: 17, name: "اماني العصار",         password: "pass@17" },
  { num: 18, name: "لبنى الجعبري",         password: "pa@ss18" },
  { num: 19, name: "هديل أبو نحل",         password: "pa@ss19" },
  { num: 20, name: "أسماء أبو سنيمة",      password: "pass@20" }
];

// الأعمدة المراد عرضها (اسم العمود في الشيت)
var SHOW_COLS = [
  "child_name",
  "Id",
  "child_sex",
  "age_months_basic",
  "place",
  "age_group",
  "respondent_name",
  "phone_number"
];

var LABELS = {
  "child_name":       "اسم الطفل",
  "Id":               "رقم الهوية",
  "child_sex":        "الجنس",
  "age_months_basic": "العمر (أشهر)",
  "place":            "المكان",
  "age_group":        "الفئة العمرية",
  "respondent_name": "اسم مقدم الرعاية",
  "phone_number":     "رقم الهاتف"
};

// ============================================================
function doLogin() {
  var n = parseInt(document.getElementById("num").value.trim(), 10);
  var p = document.getElementById("pass").value.trim();

  if (!n || !p) { showErr("يرجى ملء جميع الحقول"); return; }

  var user = null;
  for (var i = 0; i < USERS.length; i++) {
    if (USERS[i].num === n && USERS[i].password === p) {
      user = USERS[i]; break;
    }
  }

  if (!user) { showErr("❌ الكود أو كلمة المرور غير صحيحة"); return; }

  document.getElementById("load").style.display = "block";
  document.getElementById("err").style.display  = "none";

  fetchData(user);
}

// ============================================================
function fetchData(user) {
  // نجلب Sheet1 عبر Google Sheets CSV export (عام بدون API key)
  var url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID
        + "/gviz/tq?tqx=out:csv&sheet=Sheet1&cacheBust=" + new Date().getTime();

  fetch(url)
    .then(function(r) { return r.text(); })
    .then(function(csv) {
      document.getElementById("load").style.display = "none";
      var rows = parseCSV(csv);
      if (rows.length < 2) { showErr("لا توجد بيانات"); return; }

      var headers = rows[0];
      // أعمدة الفلتر J(9) K(10) L(11)
      var idxJ = 9, idxK = 10, idxL = 11;

      var filtered = [];
      for (var r = 1; r < rows.length; r++) {
        var row = rows[r];
        var vJ = parseFloat(row[idxJ]);
        var vK = parseFloat(row[idxK]);
        var vL = parseFloat(row[idxL]);
        if (vJ === user.num || vK === user.num || vL === user.num) {
          filtered.push(row);
        }
      }

      showData(user, headers, filtered);
    })
    .catch(function() {
      document.getElementById("load").style.display = "none";
      showErr("❌ تعذر الوصول إلى البيانات. تأكد أن الشيت مشارك للعموم.");
    });
}

// ============================================================
function showData(user, headers, rows) {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("dataBox").style.display  = "block";
  document.getElementById("userName").textContent   = user.name;
  document.getElementById("userInfo").textContent   = "الكود: " + user.num + " | عدد الحالات: " + rows.length;
  document.getElementById("countBadge").textContent = rows.length + " حالة";

  // رأس الجدول
  var head = "<tr><th>#</th>";
  for (var c = 0; c < SHOW_COLS.length; c++) {
    head += "<th>" + (LABELS[SHOW_COLS[c]] || SHOW_COLS[c]) + "</th>";
  }
  head += "</tr>";
  document.getElementById("tableHead").innerHTML = head;

  // جسم الجدول
  if (rows.length === 0) {
    document.getElementById("tableBody").innerHTML =
      "<tr><td colspan='9' class='empty'>لا توجد حالات مدخلة لهذا الكود</td></tr>";
    return;
  }

  var body = "";
  for (var r = 0; r < rows.length; r++) {
    body += "<tr><td style='color:#aaa;font-size:11px'>" + (r+1) + "</td>";
    for (var c = 0; c < SHOW_COLS.length; c++) {
      var idx;

if (SHOW_COLS[c] === "respondent_name") {
  idx = headers.indexOf("respondent_name");

  if (idx === -1) {
    idx = columnToIndex("VJ");
  }
} else {
  idx = headers.indexOf(SHOW_COLS[c]);
}

var val = (idx >= 0 && rows[r][idx]) ? rows[r][idx] : "-";
      body += "<td>" + val + "</td>";
    }
    body += "</tr>";
  }
  document.getElementById("tableBody").innerHTML = body;
}

// ============================================================
function logout() {
  document.getElementById("dataBox").style.display  = "none";
  document.getElementById("loginBox").style.display = "block";
  document.getElementById("num").value  = "";
  document.getElementById("pass").value = "";
}

function showErr(m) {
  var e = document.getElementById("err");
  e.textContent = m;
  e.style.display = "block";
}

// CSV parser بسيط
function parseCSV(text) {
  var rows = [];
  var lines = text.split("\n");
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    var cols = [];
    var cur = "", inQ = false;
    for (var j = 0; j < line.length; j++) {
      var ch = line[j];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") doLogin();
});
  function columnToIndex(col) {
  col = col.toUpperCase().trim();
  var num = 0;

  for (var i = 0; i < col.length; i++) {
    num = num * 26 + (col.charCodeAt(i) - 64);
  }

  return num - 1;
}
</script>
</body>
</html>
